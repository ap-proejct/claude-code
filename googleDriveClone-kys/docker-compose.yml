version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: googledrive-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: googledrive
      MYSQL_USER: googledrive
      MYSQL_PASSWORD: googledrive1234
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --init-connect=SET NAMES utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "googledrive", "-pgoogledrive1234"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
