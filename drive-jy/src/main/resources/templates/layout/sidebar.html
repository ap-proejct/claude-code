<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0">
  <div class="p-4 border-b border-gray-200">
    <a th:href="@{/drive}" class="flex items-center gap-2">
      <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
        <path d="M19 2H5C3.9 2 3 2.9 3 4v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V18z"/>
      </svg>
      <span class="font-semibold text-gray-900">Drive</span>
    </a>
  </div>
  <nav class="flex-1 p-3 space-y-1">
    <a th:href="@{/drive}"
       th:class="${currentPath == '/drive'} ? 'sidebar-item-active' : 'sidebar-item'">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
      </svg>
      내 드라이브
    </a>
    <a th:href="@{/drive/shared-with-me}"
       th:class="${currentPath == '/drive/shared-with-me'} ? 'sidebar-item-active' : 'sidebar-item'">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      공유 문서함
    </a>
    <a th:href="@{/drive/starred}"
       th:class="${currentPath == '/drive/starred'} ? 'sidebar-item-active' : 'sidebar-item'">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
      </svg>
      중요 항목
    </a>
    <a th:href="@{/trash}"
       th:class="${currentPath == '/trash'} ? 'sidebar-item-active' : 'sidebar-item'">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
      휴지통
    </a>
    <div class="border-t border-gray-200 my-2"></div>
    <a th:href="@{/groups}"
       th:class="${currentPath == '/groups'} ? 'sidebar-item-active' : 'sidebar-item'">
      <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      그룹
    </a>
  </nav>

  <!-- 사용자 프로필 -->
  <div class="p-3 border-t border-gray-200">
    <a th:href="@{/profile}"
       th:class="${currentPath == '/profile'} ? 'sidebar-item-active' : 'sidebar-item'">
      <div class="w-8 h-8 rounded-full bg-brand-100 flex items-center justify-center shrink-0">
        <span class="text-sm font-semibold text-brand-700"
              th:text="${currentUser != null ? currentUser.name.substring(0, 1).toUpperCase() : '?'}"></span>
      </div>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-medium text-gray-900 truncate" th:text="${currentUser?.name}"></p>
        <p class="text-xs text-gray-400">ID: <span th:text="${currentUser?.id}"></span></p>
      </div>
    </a>
  </div>

  <!-- 스토리지 사용량 -->
  <div class="p-4 border-t border-gray-200">
    <div class="flex items-center justify-between mb-1">
      <span class="text-xs text-gray-500">스토리지</span>
      <span class="text-xs text-gray-500"
            th:text="${#numbers.formatDecimal(storageUsedBytes / 1073741824.0, 1, 1)} + ' / ' + ${#numbers.formatDecimal(storageLimitBytes / 1073741824.0, 1, 1)} + ' GB'">
      </span>
    </div>
    <div class="w-full bg-gray-200 rounded-full h-1.5">
      <div class="h-1.5 rounded-full transition-all"
           th:classappend="${storageUsedPct >= 90} ? 'bg-red-500' : 'bg-brand-500'"
           th:style="'width:' + ${storageUsedPct} + '%'"></div>
    </div>
  </div>
</aside>
</body>
</html>
