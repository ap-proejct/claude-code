<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${file.name} + ' — Drive 공유'">공유 파일 — Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">

  <!-- 헤더 로고 -->
  <div class="mb-8 flex items-center gap-2">
    <svg class="w-7 h-7 text-brand-600" fill="currentColor" viewBox="0 0 24 24">
      <path d="M19 2H5C3.9 2 3 2.9 3 4v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V18z"/>
    </svg>
    <span class="font-semibold text-gray-800 text-lg">Drive</span>
  </div>

  <!-- 파일 카드 -->
  <div class="bg-white rounded-2xl shadow-md border border-gray-200 w-full max-w-md overflow-hidden">

    <!-- 파일 아이콘 영역 -->
    <div class="bg-gray-50 flex items-center justify-center py-10 border-b border-gray-200">
      <!-- 폴더 -->
      <svg th:if="${file.type.name() == 'FOLDER'}"
           class="w-20 h-20 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
        <path d="M10 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/>
      </svg>
      <!-- 파일 -->
      <svg th:unless="${file.type.name() == 'FOLDER'}"
           class="w-20 h-20 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
    </div>

    <!-- 파일 정보 -->
    <div class="px-6 py-5">
      <h1 class="text-lg font-semibold text-gray-900 mb-1 truncate" th:text="${file.name}"></h1>
      <div class="flex items-center gap-4 text-sm text-gray-500">
        <span th:if="${file.sizeBytes > 0}"
              th:text="${#numbers.formatDecimal(file.sizeBytes / 1048576.0, 1, 1)} + ' MB'"></span>
        <span class="inline-flex items-center gap-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          <span th:text="${file.permission == 'VIEWER'} ? '보기 가능' : '편집 가능'"></span>
        </span>
      </div>
    </div>

    <!-- 다운로드 버튼 -->
    <div th:if="${file.type.name() == 'FILE'}" class="px-6 pb-6">
      <a th:href="@{/api/files/{id}/download(id=${file.fileId})}"
         class="flex items-center justify-center gap-2 w-full py-2.5 bg-brand-600 text-white text-sm font-medium rounded-xl hover:bg-brand-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        다운로드
      </a>
    </div>
  </div>

  <p class="mt-6 text-xs text-gray-400">
    Drive에서 공유된 링크입니다. · <a th:href="@{/drive}" class="hover:underline">Drive 열기</a>
  </p>
</body>
</html>
