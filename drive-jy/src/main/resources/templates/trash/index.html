<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(pageTitle='휴지통', content=~{::main-content})}">
<body>
  <th:block th:fragment="main-content">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-semibold text-gray-900">휴지통</h1>
      <button id="btn-empty-trash"
              th:disabled="${#lists.isEmpty(files)}"
              class="btn-danger disabled:opacity-40 disabled:cursor-not-allowed">
        휴지통 비우기
      </button>
    </div>

    <!-- 비어있을 때 -->
    <div th:if="${#lists.isEmpty(files)}" class="flex items-center justify-center h-64 text-gray-400">
      <div class="text-center">
        <svg class="w-16 h-16 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        <p class="text-sm">휴지통이 비어 있습니다.</p>
        <p class="text-xs text-gray-400 mt-1">30일 후 자동으로 삭제됩니다.</p>
      </div>
    </div>

    <!-- 파일 목록 테이블 -->
    <div th:unless="${#lists.isEmpty(files)}" class="bg-white rounded-xl border border-gray-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left py-3 px-4 font-medium text-gray-600">이름</th>
            <th class="text-left py-3 px-4 font-medium text-gray-600 w-32">크기</th>
            <th class="text-left py-3 px-4 font-medium text-gray-600 w-40">삭제 일시</th>
            <th class="py-3 px-4 w-32"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="file : ${files}"
              class="border-b border-gray-100 hover:bg-gray-50"
              th:data-id="${file.id}">
            <td class="py-3 px-4">
              <div class="flex items-center gap-3">
                <!-- 폴더 아이콘 -->
                <svg th:if="${file.type.name() == 'FOLDER'}"
                     class="w-5 h-5 text-blue-400 shrink-0" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M10 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/>
                </svg>
                <!-- 파일 아이콘 -->
                <svg th:unless="${file.type.name() == 'FOLDER'}"
                     class="w-5 h-5 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                <span class="text-gray-800" th:text="${file.name}"></span>
              </div>
            </td>
            <td class="py-3 px-4 text-gray-500"
                th:text="${file.type.name() == 'FOLDER' ? '—' : (#numbers.formatInteger(file.sizeBytes / 1024, 1) + ' KB')}"></td>
            <td class="py-3 px-4 text-gray-500"
                th:text="${file.trashedAt != null ? #temporals.format(file.trashedAt, 'yyyy-MM-dd HH:mm') : '—'}"></td>
            <td class="py-3 px-4">
              <div class="flex items-center gap-2 justify-end">
                <button class="btn-restore text-xs px-3 py-1 rounded-lg bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors"
                        th:data-id="${file.id}">
                  복원
                </button>
                <button class="btn-delete-permanent text-xs px-3 py-1 rounded-lg bg-red-50 border border-red-200 text-red-700 hover:bg-red-100 transition-colors"
                        th:data-id="${file.id}">
                  영구 삭제
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 안내 문구 -->
    <p th:unless="${#lists.isEmpty(files)}" class="text-xs text-gray-400 mt-3">
      휴지통의 파일은 30일 후 자동으로 영구 삭제됩니다.
    </p>

    <script th:inline="javascript">
      // 복원 버튼
      $('.btn-restore').on('click', async function() {
        const id = $(this).data('id');
        const res = await apiFetch(`/api/trash/${id}/restore`, 'POST');
        if (res.ok) location.reload();
        else alert('복원에 실패했습니다.');
      });

      // 영구 삭제 버튼
      $('.btn-delete-permanent').on('click', async function() {
        if (!confirm('영구 삭제하면 복원할 수 없습니다. 계속하시겠습니까?')) return;
        const id = $(this).data('id');
        const res = await apiFetch(`/api/trash/${id}`, 'DELETE');
        if (res.ok) location.reload();
        else alert('삭제에 실패했습니다.');
      });

      // 휴지통 비우기
      $('#btn-empty-trash').on('click', async () => {
        if (!confirm('휴지통의 모든 파일을 영구 삭제합니다. 계속하시겠습니까?')) return;
        const res = await apiFetch('/api/trash', 'DELETE');
        if (res.ok) location.reload();
        else alert('비우기에 실패했습니다.');
      });
    </script>
  </th:block>
</body>
</html>
