<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — Drive</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-md px-4">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-blue-600 rounded-xl mb-3">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M19 2H5C3.9 2 3 2.9 3 4v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V18z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Drive</h1>
      <p class="text-gray-500 mt-1 text-sm">새 계정 만들기</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <div th:if="${error}"
           class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-600"
           th:text="${error}"></div>

      <form th:action="@{/auth/register}" method="post" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
          <input type="text" name="name" th:value="${request?.name}"
                 required placeholder="홍길동" autocomplete="name"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
          <input type="email" name="email" th:value="${request?.email}"
                 required placeholder="example@email.com" autocomplete="email"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
          <input type="password" name="password"
                 required placeholder="8자 이상" autocomplete="new-password"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-colors">
        </div>
        <button type="submit"
                class="w-full py-2 px-4 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors text-sm font-medium mt-2">
          회원가입
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        이미 계정이 있으신가요?
        <a th:href="@{/auth/login}" class="text-blue-600 hover:underline font-medium">로그인</a>
      </p>
    </div>
  </div>
</body>
</html>
