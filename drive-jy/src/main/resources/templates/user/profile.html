<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(pageTitle='내 프로필', content=~{::main-content})}">
<body>
  <th:block th:fragment="main-content">

    <div class="max-w-lg mx-auto">
      <h1 class="text-xl font-semibold text-gray-900 mb-6">내 프로필</h1>

      <!-- 내 ID 카드 (그룹 초대용) -->
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 mb-6 flex items-center justify-between">
        <div>
          <p class="text-xs text-blue-600 font-medium mb-0.5">내 사용자 ID</p>
          <p class="text-2xl font-bold text-blue-700" th:text="${currentUser?.id}"></p>
          <p class="text-xs text-blue-500 mt-0.5">그룹 초대 시 이 ID를 상대방에게 알려주세요.</p>
        </div>
        <button id="btn-copy-id"
                class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span id="copy-label">복사</span>
        </button>
      </div>

      <!-- 프로필 정보 카드 -->
      <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-5">

        <!-- 이메일 (읽기 전용) -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
          <input type="text" class="input-field bg-gray-50 text-gray-500 cursor-not-allowed"
                 th:value="${currentUser?.email}" readonly>
        </div>

        <!-- 이름 수정 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
          <div class="flex gap-2">
            <input type="text" id="input-name" class="input-field flex-1"
                   th:value="${currentUser?.name}" placeholder="이름을 입력하세요">
            <button id="btn-save-name"
                    class="shrink-0 px-4 py-2 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition-colors">
              저장
            </button>
          </div>
          <p id="save-feedback" class="hidden text-xs text-green-600 mt-1">이름이 변경되었습니다.</p>
          <p id="save-error" class="hidden text-xs text-red-600 mt-1"></p>
        </div>

        <!-- 스토리지 사용량 -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">스토리지 사용량</label>
          <div class="flex items-center justify-between mb-1">
            <span class="text-sm text-gray-600"
                  th:text="${#numbers.formatDecimal(storageUsedBytes / 1073741824.0, 1, 2)} + ' GB 사용 중'"></span>
            <span class="text-sm text-gray-400"
                  th:text="${#numbers.formatDecimal(storageLimitBytes / 1073741824.0, 1, 0)} + ' GB 한도'"></span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2">
            <div class="h-2 rounded-full transition-all"
                 th:classappend="${storageUsedPct >= 90} ? 'bg-red-500' : 'bg-brand-500'"
                 th:style="'width:' + ${storageUsedPct} + '%'"></div>
          </div>
          <p class="text-xs text-gray-400 mt-1"
             th:text="${storageUsedPct} + '% 사용'"></p>
        </div>
      </div>
    </div>

    <script th:inline="javascript">
      const myId = /*[[${currentUser?.id}]]*/ null;

      // ID 복사
      document.getElementById('btn-copy-id').addEventListener('click', () => {
        navigator.clipboard.writeText(String(myId)).then(() => {
          const label = document.getElementById('copy-label');
          label.textContent = '복사됨!';
          setTimeout(() => { label.textContent = '복사'; }, 2000);
        });
      });

      // 이름 저장
      document.getElementById('btn-save-name').addEventListener('click', async () => {
        const name = document.getElementById('input-name').value.trim();
        if (!name) return;
        const feedback = document.getElementById('save-feedback');
        const errorEl = document.getElementById('save-error');
        feedback.classList.add('hidden');
        errorEl.classList.add('hidden');
        const res = await apiFetch('/api/users/me', 'PATCH', { name });
        if (res.ok) {
          feedback.classList.remove('hidden');
          setTimeout(() => feedback.classList.add('hidden'), 3000);
        } else {
          const json = await res.json().catch(() => ({}));
          errorEl.textContent = json.error?.message ?? '저장에 실패했습니다.';
          errorEl.classList.remove('hidden');
        }
      });

      document.getElementById('input-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-save-name').click();
      });
    </script>
  </th:block>
</body>
</html>
