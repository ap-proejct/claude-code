<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(pageTitle='내 드라이브', content=~{::main-content})}">
<body>
  <th:block th:fragment="main-content">

    <!-- 헤더 -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-semibold text-gray-900">내 드라이브</h1>
      <div class="flex items-center gap-2">
        <button id="btn-new-folder" class="btn-secondary">
          <span class="flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            </svg>
            새 폴더
          </span>
        </button>
        <label for="file-input" class="btn-primary cursor-pointer">
          <span class="flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            업로드
          </span>
        </label>
        <input type="file" id="file-input" class="hidden" multiple>
      </div>
    </div>

    <!-- 업로드 진행 바 -->
    <div id="upload-progress" class="hidden mb-4 bg-white rounded-xl border border-gray-200 p-4">
      <p class="text-sm text-gray-600 mb-2">업로드 중...</p>
      <div class="w-full bg-gray-200 rounded-full h-2">
        <div id="progress-bar" class="bg-brand-600 h-2 rounded-full transition-all" style="width:0%"></div>
      </div>
    </div>

    <!-- 파일이 없을 때 -->
    <div th:if="${#lists.isEmpty(files)}" id="empty-state"
         class="flex items-center justify-center h-64 text-gray-400">
      <div class="text-center">
        <svg class="w-16 h-16 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
        </svg>
        <p class="text-sm">파일이 없습니다.</p>
        <p class="text-xs text-gray-400 mt-1">파일을 업로드하거나 폴더를 만들어보세요.</p>
      </div>
    </div>

    <!-- Tailwind 동적 클래스 safelist -->
    <span class="hidden ring-2 ring-blue-500 bg-blue-50 ring-green-400 bg-green-50 opacity-50"></span>

    <!-- 파일 그리드 -->
    <div th:unless="${#lists.isEmpty(files)}" id="file-grid"
         class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3">
      <div th:each="file : ${files}"
           class="card p-3 cursor-pointer group relative select-none transition-all"
           draggable="true"
           th:data-id="${file.id}"
           th:data-name="${file.name}"
           th:data-type="${file.type}"
           th:data-starred="${file.isStarred}">
        <!-- 폴더 아이콘 -->
        <div class="flex justify-center mb-2">
          <svg th:if="${file.type.name() == 'FOLDER'}"
               class="w-12 h-12 text-blue-400" fill="currentColor" viewBox="0 0 24 24">
            <path d="M10 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/>
          </svg>
          <svg th:unless="${file.type.name() == 'FOLDER'}"
               class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p class="text-xs text-center truncate text-gray-700" th:text="${file.name}"></p>
        <!-- 더보기 버튼 -->
        <button class="btn-more absolute top-1 right-1 opacity-0 group-hover:opacity-100
                       p-1 rounded hover:bg-gray-200 transition-opacity"
                th:data-id="${file.id}"
                th:data-name="${file.name}"
                th:data-type="${file.type}">
          <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 컨텍스트 메뉴 -->
    <div id="context-menu"
         class="hidden fixed z-50 bg-white rounded-xl shadow-lg border border-gray-200 py-1 min-w-[160px]">
      <button id="ctx-open" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">열기</button>
      <button id="ctx-download" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">다운로드</button>
      <button id="ctx-rename" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">이름 변경</button>
      <div class="border-t border-gray-100 my-1"></div>
      <button id="ctx-trash" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50">휴지통으로 이동</button>
    </div>

    <!-- 파일 정보 패널 -->
    <div id="preview-panel"
         class="hidden fixed right-0 top-0 h-full w-64 bg-white border-l border-gray-200 shadow-xl z-40 flex flex-col">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 shrink-0">
        <p id="preview-title" class="text-sm font-medium text-gray-900 truncate flex-1 mr-2"></p>
        <button id="close-preview" class="p-1 rounded hover:bg-gray-100 shrink-0">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="flex-1 flex flex-col items-center justify-center gap-3 p-6">
        <svg class="w-20 h-20 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p id="preview-filename" class="text-sm text-gray-500 text-center break-all"></p>
      </div>
      <div class="border-t border-gray-200 p-4 space-y-2 shrink-0">
        <button id="btn-panel-preview"
                class="w-full flex items-center gap-2 px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          미리보기
        </button>
        <a id="btn-panel-download" href="#" target="_blank"
           class="w-full flex items-center gap-2 px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          다운로드
        </a>
        <button id="btn-panel-star"
                class="w-full flex items-center gap-2 px-4 py-2 bg-white text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors text-sm font-medium">
          <svg id="star-icon-filled" class="w-4 h-4 text-yellow-400 hidden" fill="currentColor" viewBox="0 0 24 24">
            <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
          <svg id="star-icon-outline" class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
          <span id="star-label">중요 항목 추가</span>
        </button>
        <button id="btn-panel-share"
                class="w-full flex items-center gap-2 px-4 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 transition-colors text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
          </svg>
          공유하기
        </button>
      </div>
    </div>

    <!-- 공유 링크 모달 -->
    <div id="modal-share"
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
          <h2 class="text-base font-semibold">공유 링크 생성</h2>
          <button id="close-modal-share" class="p-1 rounded hover:bg-gray-100">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-6 py-4 space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">권한</label>
            <select id="share-permission" class="input-field">
              <option value="VIEWER">뷰어 — 보기만 가능</option>
              <option value="EDITOR">편집자 — 다운로드 가능</option>
            </select>
          </div>
          <div id="share-link-wrap" class="hidden">
            <label class="block text-sm font-medium text-gray-700 mb-1">공유 링크</label>
            <div class="flex gap-2">
              <input type="text" id="share-link-input" class="input-field flex-1" readonly>
              <button id="btn-copy-link"
                      class="shrink-0 px-3 py-2 bg-gray-100 text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-200 text-sm font-medium">
                복사
              </button>
            </div>
            <p id="copy-feedback" class="hidden text-xs text-green-600 mt-1">링크가 복사되었습니다.</p>
          </div>
          <div class="flex gap-2 justify-end pt-1">
            <button id="cancel-share" class="btn-secondary">닫기</button>
            <button id="confirm-share" class="btn-primary">링크 생성</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 새 폴더 모달 -->
    <div id="modal-new-folder"
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
          <h2 class="text-base font-semibold">새 폴더</h2>
          <button id="close-modal-folder" class="p-1 rounded hover:bg-gray-100">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-6 py-4">
          <input type="text" id="input-folder-name" class="input-field" placeholder="폴더 이름" value="새 폴더">
          <div class="flex gap-2 mt-4 justify-end">
            <button id="cancel-folder" class="btn-secondary">취소</button>
            <button id="confirm-folder" class="btn-primary">만들기</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 이름 변경 모달 -->
    <div id="modal-rename"
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm mx-4">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
          <h2 class="text-base font-semibold">이름 변경</h2>
          <button id="close-modal-rename" class="p-1 rounded hover:bg-gray-100">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="px-6 py-4">
          <input type="text" id="input-rename" class="input-field" placeholder="새 이름">
          <div class="flex gap-2 mt-4 justify-end">
            <button id="cancel-rename" class="btn-secondary">취소</button>
            <button id="confirm-rename" class="btn-primary">변경</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 드래그 앤 드롭 오버레이 -->
    <div id="drop-overlay"
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-blue-500/10 border-4 border-dashed border-brand-500 pointer-events-none">
      <div class="bg-white rounded-2xl shadow-xl px-10 py-8 flex flex-col items-center gap-3">
        <svg class="w-12 h-12 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        <p class="text-brand-700 font-semibold text-lg">여기에 놓아 업로드</p>
      </div>
    </div>

    <script th:inline="javascript">
      const parentId = null;

      // ── 선택 & 패널 ──────────────────────────────────────
      let $selectedCard = null;
      let activeFileId = null;
      let activeFileName = null;
      let activeFileType = null;
      let activeFileStarred = false;

      const $previewPanel = $('#preview-panel');

      function deselectAll() {
        if ($selectedCard) {
          $selectedCard.removeClass('ring-2 ring-blue-500 bg-blue-50');
          $selectedCard = null;
        }
        $previewPanel.addClass('hidden');
      }

      function updateStarButton(starred) {
        activeFileStarred = starred;
        $('#star-icon-filled').toggleClass('hidden', !starred);
        $('#star-icon-outline').toggleClass('hidden', starred);
        $('#star-label').text(starred ? '중요 항목 해제' : '중요 항목 추가');
      }

      function openPanel(id, name, starred) {
        $('#preview-title').text(name);
        $('#preview-filename').text(name);
        $('#btn-panel-download').attr('href', `/api/files/${id}/download`);
        $('#share-link-wrap').addClass('hidden');
        $('#share-link-input').val('');
        updateStarButton(starred ?? false);
        $previewPanel.removeClass('hidden');
      }

      function handleCardClick(e, $card) {
        if ($(e.target).closest('.btn-more').length) return;
        e.stopPropagation();

        if ($selectedCard && $selectedCard[0] === $card[0]) { deselectAll(); return; }
        if ($selectedCard) $selectedCard.removeClass('ring-2 ring-blue-500 bg-blue-50');

        $selectedCard = $card;
        $card.addClass('ring-2 ring-blue-500 bg-blue-50');

        activeFileId = $card.data('id');
        activeFileName = $card.data('name');
        activeFileType = $card.data('type');

        if ($card.data('type') !== 'FOLDER') {
          openPanel($card.data('id'), $card.data('name'), $card.data('starred') === true);
        } else {
          $previewPanel.addClass('hidden');
        }
      }

      $('.card').on('click', function(e) { handleCardClick(e, $(this)); })
                .on('dblclick', function() {
                  if ($(this).data('type') === 'FOLDER') location.href = `/drive/folder/${$(this).data('id')}`;
                });

      // ── 내부 드래그 이동 ──────────────────────────────────
      $('.card').on('dragstart', function(e) {
        e.originalEvent.dataTransfer.setData('application/drive-file-id', String($(this).data('id')));
        e.originalEvent.dataTransfer.effectAllowed = 'move';
        $(this).addClass('opacity-50');
      }).on('dragend', function() {
        $(this).removeClass('opacity-50');
      });

      $('.card[data-type="FOLDER"]').on('dragover', function(e) {
        if (!e.originalEvent.dataTransfer.types.includes('application/drive-file-id')) return;
        e.preventDefault();
        e.stopPropagation();
        e.originalEvent.dataTransfer.dropEffect = 'move';
        $(this).addClass('ring-2 ring-green-400 bg-green-50');
      }).on('dragleave', function(e) {
        if ($(e.relatedTarget).closest(this).length) return;
        $(this).removeClass('ring-2 ring-green-400 bg-green-50');
      }).on('drop', async function(e) {
        e.preventDefault();
        e.stopPropagation();
        $(this).removeClass('ring-2 ring-green-400 bg-green-50');
        const fileId = e.originalEvent.dataTransfer.getData('application/drive-file-id');
        const folderId = $(this).data('id');
        if (!fileId || String(fileId) === String(folderId)) return;
        const res = await apiFetch(`/api/files/${fileId}/move`, 'PATCH', { parentId: folderId });
        if (res.ok) location.reload();
        else alert('이동에 실패했습니다.');
      });

      $('#close-preview').on('click', deselectAll);

      // 미리보기 — 새 탭
      $('#btn-panel-preview').on('click', () => {
        if (activeFileId) window.open(`/api/files/${activeFileId}/preview`, '_blank');
      });

      // 별표 (중요 항목)
      $('#btn-panel-star').on('click', async () => {
        if (!activeFileId) return;
        const res = await apiFetch(`/api/files/${activeFileId}/star`, 'PATCH');
        if (res.ok) {
          const json = await res.json();
          updateStarButton(json.data.isStarred);
        } else {
          alert('중요 항목 변경에 실패했습니다.');
        }
      });

      // 공유 모달
      const $modalShare = $('#modal-share');
      $('#btn-panel-share').on('click', () => {
        $('#share-link-wrap').addClass('hidden');
        $('#share-link-input').val('');
        $('#copy-feedback').addClass('hidden');
        $modalShare.removeClass('hidden');
      });
      $('#close-modal-share, #cancel-share').on('click', () => $modalShare.addClass('hidden'));

      $('#confirm-share').on('click', async () => {
        const permission = $('#share-permission').val();
        const res = await apiFetch(`/api/share/${activeFileId}`, 'POST', { permission });
        if (res.ok) {
          const json = await res.json();
          const token = json.data.token;
          const url = `${location.origin}/share/${token}`;
          $('#share-link-input').val(url);
          $('#share-link-wrap').removeClass('hidden');
        } else {
          alert('공유 링크 생성에 실패했습니다.');
        }
      });

      $('#btn-copy-link').on('click', () => {
        navigator.clipboard.writeText($('#share-link-input').val()).then(() => {
          const $fb = $('#copy-feedback');
          $fb.removeClass('hidden');
          setTimeout(() => $fb.addClass('hidden'), 2000);
        });
      });

      $(document).on('click', e => {
        if (!$(e.target).closest('.card, #preview-panel, #context-menu, #modal-share').length) {
          deselectAll();
        }
        if (!$(e.target).closest('#context-menu').length) $contextMenu.addClass('hidden');
      });

      // ── 파일 업로드 ──────────────────────────────────────
      const $progressWrap = $('#upload-progress');
      const $progressBar = $('#progress-bar');

      async function uploadFiles(files) {
        if (!files.length) return;
        $progressWrap.removeClass('hidden');
        let done = 0;

        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          if (parentId) formData.append('parentId', String(parentId));

          await new Promise((resolve) => {
            $.ajax({
              url: '/api/files/upload',
              method: 'POST',
              data: formData,
              processData: false,
              contentType: false,
              xhr: function() {
                const xhr = new XMLHttpRequest();
                xhr.upload.addEventListener('progress', e => {
                  if (e.lengthComputable) {
                    const pct = Math.round(((done + e.loaded / e.total) / files.length) * 100);
                    $progressBar.css('width', pct + '%');
                  }
                });
                return xhr;
              },
              complete: () => { done++; resolve(); }
            });
          });
        }

        $progressWrap.addClass('hidden');
        $progressBar.css('width', '0%');
        location.reload();
      }

      $('#file-input').on('change', async function() {
        await uploadFiles(Array.from(this.files));
        $(this).val('');
      });

      // ── 드래그 앤 드롭 ───────────────────────────────────
      const $dropOverlay = $('#drop-overlay');
      let dragCounter = 0;

      $(document).on('dragenter', e => {
        if (!e.originalEvent.dataTransfer.types.includes('Files')) return;
        e.preventDefault();
        if (dragCounter++ === 0) $dropOverlay.removeClass('hidden');
      }).on('dragleave', e => {
        if (--dragCounter === 0) $dropOverlay.addClass('hidden');
      }).on('dragover', e => {
        e.preventDefault();
      }).on('drop', async e => {
        e.preventDefault();
        dragCounter = 0;
        $dropOverlay.addClass('hidden');
        const files = Array.from(e.originalEvent.dataTransfer.files);
        await uploadFiles(files);
      });

      // ── 새 폴더 모달 ────────────────────────────────────
      const $modalFolder = $('#modal-new-folder');
      const $inputFolderName = $('#input-folder-name');

      $('#btn-new-folder').on('click', () => {
        $inputFolderName.val('새 폴더');
        $modalFolder.removeClass('hidden');
        $inputFolderName.focus();
        $inputFolderName[0].select();
      });
      $('#close-modal-folder, #cancel-folder').on('click', () => $modalFolder.addClass('hidden'));
      $('#confirm-folder').on('click', async () => {
        const name = $inputFolderName.val().trim();
        if (!name) return;
        const res = await apiFetch('/api/files/folders', 'POST', { name, parentId });
        if (res.ok) { $modalFolder.addClass('hidden'); location.reload(); }
        else alert('폴더 생성에 실패했습니다.');
      });
      $inputFolderName.on('keydown', e => { if (e.key === 'Enter') $('#confirm-folder').trigger('click'); });

      // ── 컨텍스트 메뉴 ───────────────────────────────────
      const $contextMenu = $('#context-menu');

      function showMenu(x, y, id, name, type) {
        activeFileId = id;
        activeFileName = name;
        activeFileType = type;
        $('#ctx-open').toggleClass('hidden', type !== 'FOLDER');
        $('#ctx-download').toggleClass('hidden', type === 'FOLDER');
        $contextMenu.css({ left: x, top: y }).removeClass('hidden');
      }

      $('.btn-more').on('click', function(e) {
        e.stopPropagation();
        const rect = this.getBoundingClientRect();
        showMenu(rect.left, rect.bottom + 4, $(this).data('id'), $(this).data('name'), $(this).data('type'));
      });

      $('#ctx-open').on('click', () => {
        if (activeFileType === 'FOLDER') location.href = `/drive/folder/${activeFileId}`;
      });

      $('#ctx-download').on('click', () => {
        location.href = `/api/files/${activeFileId}/download`;
      });

      // ── 이름 변경 모달 ──────────────────────────────────
      const $modalRename = $('#modal-rename');
      const $inputRename = $('#input-rename');

      $('#ctx-rename').on('click', () => {
        $inputRename.val(activeFileName);
        $modalRename.removeClass('hidden');
        $inputRename.focus();
        $inputRename[0].select();
      });
      $('#close-modal-rename, #cancel-rename').on('click', () => $modalRename.addClass('hidden'));
      $('#confirm-rename').on('click', async () => {
        const name = $inputRename.val().trim();
        if (!name || name === activeFileName) { $modalRename.addClass('hidden'); return; }
        const res = await apiFetch(`/api/files/${activeFileId}/rename`, 'PATCH', { name });
        if (res.ok) { $modalRename.addClass('hidden'); location.reload(); }
        else alert('이름 변경에 실패했습니다.');
      });
      $inputRename.on('keydown', e => { if (e.key === 'Enter') $('#confirm-rename').trigger('click'); });

      // ── 휴지통으로 이동 ─────────────────────────────────
      $('#ctx-trash').on('click', async () => {
        if (!confirm(`"${activeFileName}"을(를) 휴지통으로 이동하시겠습니까?`)) return;
        const res = await apiFetch(`/api/files/${activeFileId}`, 'DELETE');
        if (res.ok) location.reload();
        else alert('삭제에 실패했습니다.');
      });
    </script>
  </th:block>
</body>
</html>
